<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Now Playing — Minimal</title>
  <link rel="stylesheet" href="/static/now_playing.css">
</head>
<body class="layout-minimal">
<div id="now-playing-root" class="minimal-overlay">
  <div class="minimal-dot" id="now-dot"></div>
  <div class="minimal-artist-wrap" id="now-artist-wrap">
    <span class="minimal-artist" id="now-artist"></span>
  </div>
  <div class="minimal-sep" id="now-sep"></div>
  <div class="minimal-title-wrap">
    <span class="minimal-title" id="now-title">No track playing</span>
  </div>
</div>
<script src="/static/now_playing.js"></script>
<script>
  startNowPlaying({
    interval: 500,
    onUpdate: function(s) {
      const sep  = document.getElementById('now-sep');
      const wrap = document.getElementById('now-artist-wrap');
      const show = !!s.artist;
      if (sep)  sep.style.display  = show ? '' : 'none';
      if (wrap) wrap.style.display = show ? '' : 'none';
    }
  });
</script>
</body>
</html>

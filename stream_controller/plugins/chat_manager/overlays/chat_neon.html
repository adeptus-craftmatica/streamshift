<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neon Pulse Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* Scanline texture — enabled via ?scan=1 */
    #scanlines {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.04) 0px,
        rgba(0,0,0,0.04) 1px,
        transparent 1px,
        transparent 3px
      );
    }
    #scanlines.on { display: block; }

    #feed {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .msg {
      --msg-color: #7c3aed;
      background: var(--bg-color, rgba(13,13,15,0.85));
      backdrop-filter: blur(12px);
      border-radius: 10px;
      border: 1.5px solid var(--msg-color);
      padding: 9px 13px 9px 14px;
      word-break: break-word;
      animation: neonIn 0.35s cubic-bezier(.34,1.56,.64,1) forwards,
                 pulseGlow 2.8s ease-in-out infinite alternate;
      position: relative;
      overflow: hidden;
    }

    /* Glass sheen */
    .msg::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9px;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    @keyframes neonIn {
      from { opacity: 0; transform: translateX(18px) scale(0.96); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes pulseGlow {
      from { box-shadow: 0 0 5px var(--msg-color); }
      to   { box-shadow: 0 0 14px var(--msg-color), 0 0 28px var(--msg-color); }
    }

    .msg.exit {
      animation: neonOut 0.28s ease forwards;
    }

    @keyframes neonOut {
      to { opacity: 0; transform: translateX(-12px) scale(0.96); }
    }

    .msg-name {
      font-weight: 800;
      font-size: 0.83em;
      letter-spacing: 0.02em;
      color: var(--msg-color);
      text-shadow: 0 0 8px var(--msg-color);
      margin-bottom: 3px;
    }

    .msg-text {
      font-size: 0.94em;
      line-height: 1.45;
      color: var(--text-color, #f0f0ff);
    }
  </style>
</head>
<body>
<div id="scanlines"></div>
<div id="feed"></div>
<script>
(function () {
  function p(k, d) {
    var m = location.search.match(new RegExp('[?&]' + k + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : d;
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function hexRgb(hex) {
    var h = hex.replace('#','');
    if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    var n = parseInt(h,16);
    return [(n>>16)&255,(n>>8)&255,n&255].join(',');
  }

  var accent  = '#' + p('accent',  '7c3aed');
  var bg      = '#' + p('bg',      '0d0d0f');
  var opacity = (parseInt(p('opacity','85'))/100).toFixed(2);
  var textCol = '#' + p('text',    'f0f0ff');
  var size    = p('size','14') + 'px';
  var maxMsgs = parseInt(p('max',  '10'));
  var fadeMs  = parseInt(p('fade', '0')) * 1000;
  var scan    = p('scan','0') === '1';

  document.body.style.fontSize = size;
  document.getElementById('feed').style.setProperty('--text-color', textCol);
  if (scan) document.getElementById('scanlines').classList.add('on');

  var bgRgb = hexRgb(bg);
  document.documentElement.style.setProperty(
    '--bg-color', 'rgba(' + bgRgb + ',' + opacity + ')'
  );

  var feed    = document.getElementById('feed');
  var lastId  = '';
  var fails   = 0;

  function addMsg(msg) {
    var el = document.createElement('div');
    el.className = 'msg';
    el.style.setProperty('--msg-color', msg.color || accent);
    el.innerHTML =
      '<div class="msg-name">' + esc(msg.display_name) + '</div>' +
      '<div class="msg-text">'  + esc(msg.text) + '</div>';
    feed.appendChild(el);

    while (feed.children.length > maxMsgs) {
      var old = feed.firstChild;
      old.classList.add('exit');
      setTimeout(function (o) { if (o.parentNode) o.parentNode.removeChild(o); }, 280, old);
    }

    if (fadeMs > 0) {
      setTimeout(function () { el.classList.add('exit'); }, fadeMs);
      setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, fadeMs + 280);
    }
  }

  function poll() {
    fetch('/api/messages?since=' + encodeURIComponent(lastId))
      .then(function (r) { return r.json(); })
      .then(function (d) {
        fails = 0;
        var msgs = d.messages || [];
        if (msgs.length) lastId = msgs[msgs.length - 1].id;
        msgs.forEach(function (m) { if (!m.deleted) addMsg(m); });
      })
      .catch(function () {
        if (++fails >= 6) setTimeout(function () { location.reload(); }, 3000);
      });
  }

  setInterval(poll, parseInt(p('interval','750')));
  poll();
})();
</script>
</body>
</html>

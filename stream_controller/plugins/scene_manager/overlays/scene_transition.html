<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scene — Transition</title>
  <link rel="stylesheet" href="/static/scene.css">
  <style>
    :root{--accent:#7c3aed;--accent-rgb:124,58,237;--bg:#0d0d0f;--bg-rgb:13,13,15;--bg-opacity:0.92;--text-hi:#f0f0ff;--text-lo:rgba(240,240,255,0.55);}
  </style>
</head>
<body>
<div class="trans-root">
  <div class="trans-flash" id="flash"></div>
  <div class="trans-name"  id="trans-name"></div>
</div>
<script src="/static/scene.js"></script>
<script>
startScene({
  onUpdate: function(s, changed) {
    if (!changed) return;
    var flash = document.getElementById('flash');
    var name  = document.getElementById('trans-name');
    name.textContent = s.current_scene || '';
    flash.classList.remove('flash-in');
    void flash.offsetWidth;
    flash.classList.add('flash-in');
  }
});
</script>
</body>
</html>

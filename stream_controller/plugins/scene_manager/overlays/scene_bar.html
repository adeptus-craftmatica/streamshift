<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scene — Bar</title>
  <link rel="stylesheet" href="/static/scene.css">
  <style>
    :root{--accent:#7c3aed;--accent-rgb:124,58,237;--bg:#0d0d0f;--bg-rgb:13,13,15;--bg-opacity:0.92;--text-hi:#f0f0ff;--text-lo:rgba(240,240,255,0.55);}
  </style>
</head>
<body>
<div class="bar-root">
  <div class="bar-strip s-bg" id="bar">
    <span class="bar-label">NOW</span>
    <span class="bar-name" id="bar-name">Scene</span>
  </div>
</div>
<script src="/static/scene.js"></script>
<script>
startScene({
  onUpdate: function(s, changed) {
    document.getElementById('bar-name').textContent = s.current_scene || 'No Scene';
    if (changed) {
      var b = document.getElementById('bar');
      b.classList.remove('changed');
      void b.offsetWidth;
      b.classList.add('changed');
    }
  }
});
</script>
</body>
</html>

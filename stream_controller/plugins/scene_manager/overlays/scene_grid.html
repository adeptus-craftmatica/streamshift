<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scene — Grid</title>
  <link rel="stylesheet" href="/static/scene.css">
  <style>
    :root{--accent:#7c3aed;--accent-rgb:124,58,237;--bg:#0d0d0f;--bg-rgb:13,13,15;--bg-opacity:0.92;--text-hi:#f0f0ff;--text-lo:rgba(240,240,255,0.55);}
  </style>
</head>
<body>
<div class="grid-root">
  <div class="grid-wrap" id="grid"></div>
</div>
<script src="/static/scene.js"></script>
<script>
startScene({
  onUpdate: function(s) {
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    (s.scenes || []).forEach(function(sc) {
      var cell = document.createElement('div');
      cell.className = 'grid-cell' + (sc.is_current ? ' active' : '');
      var lbl = document.createElement('div');
      lbl.className = 'grid-name';
      lbl.textContent = sc.name;
      lbl.title = sc.name;
      cell.appendChild(lbl);
      grid.appendChild(cell);
    });
  }
});
</script>
</body>
</html>

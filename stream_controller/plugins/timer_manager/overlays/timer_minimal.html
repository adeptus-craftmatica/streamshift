<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timer — Minimal</title>
  <link rel="stylesheet" href="/static/timer.css">
  <style>
    :root {
      --accent: #7c3aed;
      --accent-rgb: 124,58,237;
      --bg: #0d0d0f;
      --bg-rgb: 13,13,15;
      --bg-opacity: 0.92;
      --text-hi: #f0f0ff;
      --text-lo: rgba(240,240,255,0.55);
    }
    .min-root { position: relative; }
  </style>
</head>
<body>
<div class="min-root">
  <div class="min-pill t-bg" style="border:1px solid rgba(var(--accent-rgb,124,58,237),0.25)">
    <div class="min-dot"></div>
    <span class="min-label" id="min-label">Timer</span>
    <span class="min-sep">·</span>
    <span class="min-time"  id="min-time">00:00</span>
  </div>
  <div class="min-bar-wrap">
    <div class="min-bar-fill" id="min-fill" style="width:0%"></div>
  </div>
</div>
<script src="/static/timer.js"></script>
<script>
startTimer({
  onRaf: function(pos, s) {
    if (!s) return;
    document.getElementById('min-time').textContent = fmtSecs(pos);
    document.getElementById('min-fill').style.width = (s.progress*100).toFixed(2)+'%';
  },
  onUpdate: function(s) {
    document.getElementById('min-label').textContent = s.label || 'Timer';
  }
});
</script>
</body>
</html>

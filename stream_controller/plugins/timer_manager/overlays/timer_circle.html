<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timer — Circle</title>
  <link rel="stylesheet" href="/static/timer.css">
</head>
<body>
<div class="circ-root">
  <svg class="circ-svg" id="circ-svg" viewBox="0 0 220 220" width="220" height="220">
    <circle class="circ-track" cx="110" cy="110" r="90" stroke-width="10"/>
    <circle class="circ-ring"  id="circ-ring" cx="110" cy="110" r="90" stroke-width="10"
            stroke-dasharray="565.49" stroke-dashoffset="0"
            transform="rotate(-90 110 110)"/>
    <text class="circ-time-text"  id="circ-time"  x="110" y="104" font-size="32">00:00</text>
    <text class="circ-label-text" id="circ-label" x="110" y="140" font-size="13">Timer</text>
    <text class="circ-label-text" id="circ-status" x="110" y="158" font-size="11" fill-opacity="0.55">Ready</text>
  </svg>
</div>
<script src="/static/timer.js"></script>
<script>
var CIRC = 2 * Math.PI * 90;
startTimer({
  onRaf: function(pos, s) {
    if (!s) return;
    document.getElementById('circ-time').textContent = fmtSecs(pos);
    var offset = CIRC * (1 - (s.progress || 0));
    document.getElementById('circ-ring').setAttribute('stroke-dashoffset', offset.toFixed(2));
  },
  onUpdate: function(s) {
    document.getElementById('circ-label').textContent  = s.label  || 'Timer';
    document.getElementById('circ-status').textContent = s.status.charAt(0).toUpperCase() + s.status.slice(1);
  }
});
</script>
</body>
</html>

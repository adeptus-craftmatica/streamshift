<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timer — Corner</title>
  <link rel="stylesheet" href="/static/timer.css">
</head>
<body>
<div class="corner-root">
  <div class="corner-card t-bg" style="border:1px solid rgba(var(--accent-rgb,124,58,237),0.4)">
    <div class="corner-label" id="corner-label">Timer</div>
    <div class="corner-time"  id="corner-time">00:00</div>
  </div>
</div>
<script src="/static/timer.js"></script>
<script>
startTimer({
  onRaf: function(pos) {
    document.getElementById('corner-time').textContent = fmtSecs(pos);
  },
  onUpdate: function(s) {
    document.getElementById('corner-label').textContent = s.label || 'Timer';
  }
});
</script>
</body>
</html>

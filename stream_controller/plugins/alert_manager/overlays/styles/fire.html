<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }

#wrap {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

#fire-canvas {
  display: block;
  width: 500px;
  height: 120px;
  pointer-events: none;
}

.card {
  position: relative;
  min-width: 500px;
  max-width: 600px;
  background: linear-gradient(160deg, #1a0a00, #3d1500, #1a0800);
  border-top: 2px solid rgba(255, 100, 0, 0.4);
  padding: 22px 32px 26px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  opacity: 0;
  transform: scale(0.5);
  will-change: transform, opacity;
}

.card.show {
  animation: springIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.card.hide {
  animation: scaleOut 0.4s ease-in forwards;
}

@keyframes springIn {
  0%   { opacity: 0; transform: scale(0.5); }
  60%  { opacity: 1; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes scaleOut {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.85); }
}

@keyframes shake {
  0%,100% { opacity: 1; transform: scale(1) translateX(0); }
  15%      { opacity: 1; transform: scale(1) translateX(-6px); }
  30%      { opacity: 1; transform: scale(1) translateX(6px); }
  45%      { opacity: 1; transform: scale(1) translateX(-4px); }
  60%      { opacity: 1; transform: scale(1) translateX(4px); }
  75%      { opacity: 1; transform: scale(1) translateX(-2px); }
}

.card.shake {
  opacity: 1;
  transform: scale(1);
  animation: shake 0.5s ease 0.55s both;
}

.type-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(255, 160, 60, 0.85);
  margin-bottom: 10px;
}

.icon {
  font-size: 48px;
  line-height: 1;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 12px rgba(255,100,0,0.8));
}

.name {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(to right, #ff6b00, #ff2200, #ff8c00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 16px rgba(255,80,0,0.6));
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.msg {
  font-size: 16px;
  color: rgba(255, 200, 140, 0.9);
  text-shadow: 0 1px 6px rgba(0,0,0,0.6);
}

/* Ember glow at the top edge of the card */
.glow-bar {
  position: absolute;
  top: -1px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ff6b00, #ff2200, #ff6b00, transparent);
  filter: blur(2px);
}
</style>
</head>
<body>
<script>const ALERT_TYPE = '__ALERT_TYPE__';</script>
<div id="wrap">
  <canvas id="fire-canvas" width="500" height="120"></canvas>
  <div id="card-slot"></div>
</div>
<script>
// ── Fire particle system ──────────────────────────────────────────────────────
const canvas = document.getElementById('fire-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;
const NUM_PARTICLES = 60;

let active = false; // only animate when an alert is showing

const particles = Array.from({ length: NUM_PARTICLES }, () => spawnParticle(true));

function spawnParticle(randomY = false) {
  return {
    x: W * 0.2 + Math.random() * W * 0.6,
    y: randomY ? Math.random() * H : H,
    vx: (Math.random() - 0.5) * 0.8,
    vy: -(1.2 + Math.random() * 2.2),
    size: 4 + Math.random() * 10,
    life: Math.random(),      // 0..1, 0=new, 1=dead
    speed: 0.008 + Math.random() * 0.014,
  };
}

function particleColor(life) {
  // 0 (new) = bright yellow-white core; 1 (old) = dark red, fading
  if (life < 0.3) {
    const t = life / 0.3;
    const r = 255;
    const g = Math.round(255 - t * 100);  // 255→155
    const b = Math.round(180 - t * 180);  // 180→0
    return `rgba(${r},${g},${b},${1 - life * 0.3})`;
  } else if (life < 0.7) {
    const t = (life - 0.3) / 0.4;
    const r = 255;
    const g = Math.round(155 - t * 100); // 155→55
    return `rgba(${r},${g},0,${1 - life * 0.6})`;
  } else {
    const t = (life - 0.7) / 0.3;
    const r = Math.round(220 - t * 100);
    return `rgba(${r},0,0,${(1 - life) * 0.8})`;
  }
}

function animateFire() {
  ctx.clearRect(0, 0, W, H);

  if (!active) {
    requestAnimationFrame(animateFire);
    return;
  }

  for (const p of particles) {
    p.life += p.speed;
    if (p.life >= 1) {
      Object.assign(p, spawnParticle(false));
      continue;
    }
    p.x += p.vx + Math.sin(p.life * 8 + p.x * 0.05) * 0.4;
    p.y += p.vy;

    const radius = p.size * (1 - p.life * 0.5);
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
    grad.addColorStop(0, particleColor(p.life));
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  requestAnimationFrame(animateFire);
}

animateFire();

// ── Alert display ─────────────────────────────────────────────────────────────
const TYPE_LABELS = {
  follower: 'New Follower', subscriber: 'Subscriber', gift_sub: 'Gift Sub',
  bits: 'Bits Cheer', raid: 'Raid Incoming', donation: 'Donation'
};

const ICONS = {
  follower: '👤', subscriber: '⭐', gift_sub: '🎁',
  bits: '💎', raid: '⚔️', donation: '💰'
};

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showAlert(d) {
  const slot = document.getElementById('card-slot');
  // Remove existing card
  const existing = slot.querySelector('.card');
  if (existing) existing.remove();

  const dur = Math.max(d.duration || 5000, 1500);
  active = true;

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="glow-bar"></div>
    <div class="type-label">${esc(TYPE_LABELS[d.type] || d.type)}</div>
    <div class="icon">${ICONS[d.type] || '🔥'}</div>
    <div class="name">${esc(d.name)}</div>
    <div class="msg">${esc(d.message)}</div>
  `;
  slot.appendChild(card);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.classList.add('show');
      // Add shake after spring settles
      setTimeout(() => card.classList.add('shake'), 550);
    });
  });

  setTimeout(() => {
    card.classList.add('hide');
    card.classList.remove('show', 'shake');
    setTimeout(() => {
      card.remove();
      active = false;
    }, 450);
  }, dur - 450);
}

// ── Poll loop ─────────────────────────────────────────────────────────────────
async function poll() {
  while (true) {
    try {
      const r = await fetch('/poll/' + ALERT_TYPE);
      const data = await r.json();
      if (data.type === 'style_change') { window.location.href = '/overlay/' + ALERT_TYPE + '?_=' + Date.now(); return; }
      if (data.type !== 'ping') showAlert(data);
    } catch (e) {
      await new Promise(r => setTimeout(r, 2000));
    }
  }
}

poll();
</script>
</body>
</html>

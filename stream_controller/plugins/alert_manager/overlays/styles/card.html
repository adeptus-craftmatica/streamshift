<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }

#wrap {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 460px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

@property --angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

.card {
  position: relative;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  border-radius: 16px;
  background: rgba(12, 8, 32, 0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  width: 100%;
  opacity: 0;
  transform: translateY(60px) scale(0.95);
  transition: opacity 0.4s ease, transform 0.4s ease;
  will-change: transform, opacity;
}

.card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 18px;
  z-index: -1;
  background: conic-gradient(from var(--angle), #9333ea, #ec4899, #06b6d4, #6366f1, #9333ea);
  animation: spin 3s linear infinite;
}

.card::after {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: 15px;
  background: rgba(12, 8, 32, 0.88);
  z-index: -1;
}

@keyframes spin { to { --angle: 360deg; } }

.card.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.card.hide {
  opacity: 0;
  transform: translateY(-20px) scale(0.97);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.icon {
  font-size: 42px;
  flex-shrink: 0;
  line-height: 1;
  filter: drop-shadow(0 0 8px rgba(147, 51, 234, 0.6));
}

.body {
  flex: 1;
  min-width: 0;
}

.body .name {
  font-size: 21px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 12px rgba(147, 51, 234, 0.5);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.body .msg {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.7);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>
<body>
<script>const ALERT_TYPE = '__ALERT_TYPE__';</script>
<div id="wrap"></div>
<script>
const ICONS = {
  follower: '👤',
  subscriber: '⭐',
  gift_sub: '🎁',
  bits: '💎',
  raid: '⚔️',
  donation: '💰'
};

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function showAlert(d) {
  const wrap = document.getElementById('wrap');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="icon">${ICONS[d.type] || '🎉'}</div>
    <div class="body">
      <div class="name">${esc(d.name)}</div>
      <div class="msg">${esc(d.message)}</div>
    </div>
  `;
  wrap.appendChild(card);

  // Trigger entrance animation
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.classList.add('show');
    });
  });

  const dur = Math.max(d.duration || 5000, 1200);
  setTimeout(() => {
    card.classList.add('hide');
    card.classList.remove('show');
    setTimeout(() => card.remove(), 600);
  }, dur - 600);
}

async function poll() {
  while (true) {
    try {
      const r = await fetch('/poll/' + ALERT_TYPE);
      const data = await r.json();
      if (data.type === 'style_change') { window.location.href = '/overlay/' + ALERT_TYPE + '?_=' + Date.now(); return; }
      if (data.type !== 'ping') showAlert(data);
    } catch (e) {
      await new Promise(r => setTimeout(r, 2000));
    }
  }
}

poll();
</script>
</body>
</html>
